<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로샵 - 로블록스 개발을 더 쉽게</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background-color: #2a2a2a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            color: #00a2ff;
            margin-bottom: 10px;
        }
        p {
            color: #cccccc;
            font-size: 1.1rem;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #00a2ff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #0082cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>로샵 (Roshop)</h1>
        <p>로블록스 개발을 더 쉽게 만들어주는 공간입니다.</p>
        <p>현재 사이트 빌드 중입니다. 조금만 기다려 주세요!</p>
        <a href="#" class="btn">커뮤니티 입장하기</a>
    </div>
</body>
</html>
