<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로샵 - 로블록스 개발을 더 쉽게</title>
    <style>
        /* 변수 설정 (다크모드/라이트모드 전환용) */
        :root {
            --bg-body: #1a1a1a;
            --bg-container: #2a2a2a;
            --bg-modal: #2e2e2e;
            --bg-input: #1a1a1a;
            --text-main: #ffffff;
            --text-sub: #cccccc;
            --border-color: #444444;
            --accent-color: #00a2ff;
        }

        /* 라이트모드 스타일 테마 */
        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --bg-modal: #ffffff;
            --bg-input: #f0f2f5;
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --border-color: #cccccc;
        }

        /* 기본 기본 배경 및 전환 효과 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            background-color: var(--bg-container);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 450px;
            box-sizing: border-box;
            transition: background-color 0.3s;
        }
        h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
        }
        p {
            color: var(--text-sub);
            font-size: 1.1rem;
        }
        
        /* 버튼 공통 구조 */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background-color: #0082cc;
        }
        .btn.secondary {
            background-color: #555555;
            color: white;
        }
        [data-theme="light"] .btn.secondary {
            background-color: #e0e0e0;
            color: #333333;
        }
        .btn.secondary:hover {
            background-color: #666666;
        }
        .btn.danger {
            background-color: #ff4a4a;
        }
        .btn.danger:hover {
            background-color: #cc3333;
        }

        /* 팝업창(모달) 공통 배경 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 팝업창 본체 */
        .modal-box {
            background-color: var(--bg-modal);
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 360px;
            text-align: left;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            position: relative;
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }
        .modal-box h2 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        /* 입력창 디자인 */
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-sub);
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            color: var(--text-main);
            font-size: 1rem;
        }
        .input-group input:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        /* 팝업 우측 상단 X 버튼 */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* 모달 안의 큰 확인 버튼 */
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 설정창 내부 테마 변경 옵션 버튼 규칙 */
        .theme-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>로샵 (Roshop)</h1>
        <p id="mainMessage">로블록스 개발을 더 쉽게 만들어주는 공간입니다.</p>
        
        <div id="beforeLogin" class="btn-group">
            <button class="btn" onclick="openModal('loginModal')">로그인</button>
            <button class="btn secondary" onclick="openModal('registerModal')">회원가입</button>
        </div>

        <div id="afterLogin" style="display: none; margin-top: 25px;">
            <hr style="border: 0; height: 1px; background: var(--border-color); margin-bottom: 20px;">
            <div class="btn-group">
                <button class="btn" onclick="alert('서버 등록 기능 준비 중입니다!')">서버 등록하기</button>
                <button class="btn" style="background-color: #2ed573;" onclick="alert('서버 둘러보기 기능 준비 중입니다!')">서버 둘러보기</button>
            </div>
            <div class="btn-group" style="margin-top: 15px;">
                <button class="btn secondary" onclick="openModal('settingsModal')">⚙️ 설정창</button>
                <button class="btn danger" onclick="handleLogout()">로그아웃</button>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay" onclick="closeModalOnOverlay(event, 'loginModal')">
        <div class="modal-box">
            <button class="close-btn" onclick="closeModal('loginModal')">&times;</button>
            <h2>로그인</h2>
            <form onsubmit="handleLoginSubmit(event)">
                <div class="input-group">
                    <label>아이디</label>
                    <input type="text" id="loginId" required placeholder="아이디를 입력하세요">
                </div>
                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPw" required placeholder="비밀번호를 입력하세요">
                </div>
                <button type="submit" class="submit-btn">로그인하기</button>
            </form>
        </div>
    </div>

    <div id="registerModal" class="modal-overlay" onclick="closeModalOnOverlay(event, 'registerModal')">
        <div class="modal-box">
            <button class="close-btn" onclick="closeModal('registerModal')">&times;</button>
            <h2>회원가입</h2>
            <form onsubmit="handleRegisterSubmit(event)">
                <div class="input-group">
                    <label>아이디</label>
                    <input type="text" id="regId" required placeholder="사용할 아이디 입력">
                </div>
                <div class="input-group">
                    <label>이메일</label>
                    <input type="email" id="regEmail" required placeholder="이메일 주소 입력">
                </div>
                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" id="regPw" required placeholder="비밀번호 입력">
                </div>
                <button type="submit" class="submit-btn">가입 완료</button>
            </form>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay" onclick="closeModalOnOverlay(event, 'settingsModal')">
        <div class="modal-box">
            <button class="close-btn" onclick="closeModal('settingsModal')">&times;</button>
            <h2>⚙️ 설정</h2>
            <p style="font-size: 0.9rem; margin-bottom: 10px;">사이트 환경을 커스텀합니다.</p>
            
            <div class="theme-option">
                <span id="themeLabel" style="font-weight: bold;">현재 모드: 다크모드</span>
                <button id="themeToggleBtn" class="btn secondary" style="padding: 6px 12px; font-size: 0.85rem;" onclick="toggleTheme()">하얀색으로 변경</button>
            </div>
            <button class="submit-btn" style="margin-top: 20px;" onclick="closeModal('settingsModal')">닫기</button>
        </div>
    </div>

    <script>
        let users = [];

        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function closeModalOnOverlay(event, modalId) {
            if (event.target === document.getElementById(modalId)) {
                closeModal(modalId);
            }
        }

        // 회원가입 완료
        function handleRegisterSubmit(event) {
            event.preventDefault();
            const id = document.getElementById('regId').value;
            const email = document.getElementById('regEmail').value;
            const pw = document.getElementById('regPw').value;

            users.push({ id: id, email: email, pw: pw });
            closeModal('registerModal');
            event.target.reset();

            alert(id + '님, 회원가입이 완료되었습니다! 로그인을 진행해 주세요.');
        }

        // 로그인 완료 -> 비밀 메뉴판 개방
        function handleLoginSubmit(event) {
            event.preventDefault();
            const id = document.getElementById('loginId').value;
            const pw = document.getElementById('loginPw').value;

            const userExists = users.find(u => u.id === id && u.pw === pw);
            const loggedInId = userExists ? userExists.id : id;

            closeModal('loginModal');
            event.target.reset();

            // 상단 메시지 변경 및 UI 스위칭
            document.getElementById('mainMessage').innerHTML = '👋 안녕하세요 <strong>' + loggedInId + '</strong>님! 관리 메뉴에 진입했습니다.';
            document.getElementById('beforeLogin').style.display = 'none';
            document.getElementById('afterLogin').style.display = 'block';
        }

        // 로그아웃
        function handleLogout() {
            document.getElementById('mainMessage').innerText = '로블록스 개발을 더 쉽게 만들어주는 공간입니다.';
            document.getElementById('beforeLogin').style.display = 'flex';
            document.getElementById('afterLogin').style.display = 'none';
            alert('로그아웃 되었습니다.');
        }

        // 🌗 테마 상태 제어 함수 (다크모드 <-> 하얀색 라이트모드 변경)
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const toggleBtn = document.getElementById('themeToggleBtn');
            const themeLabel = document.getElementById('themeLabel');

            if (currentTheme === 'light') {
                // 하얀색 상태에서 누르면 -> 다크모드로 변경
                document.documentElement.removeAttribute('data-theme');
                themeLabel.innerText = '현재 모드: 다크모드';
                toggleBtn.innerText = '하얀색으로 변경';
            } else {
                // 다크모드 상태에서 누르면 -> 하얀색(라이트모드)으로 변경
                document.documentElement.setAttribute('data-theme', 'light');
                themeLabel.innerText = '현재 모드: 라이트모드';
                toggleBtn.innerText = '다크모드로 변경';
            }
        }
    </script>
</body>
</html>
