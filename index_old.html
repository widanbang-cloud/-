<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로샵 - 로블록스 개발을 더 쉽게</title>
    <style>
        /* 기존 CSS 생략 (기존과 동일하게 유지 가능) */
        :root { --bg-body: #1a1a1a; --bg-container: #2a2a2a; --bg-modal: #2e2e2e; --text-main: #ffffff; --text-sub: #cccccc; --accent-color: #00a2ff; }
        body { font-family: 'Arial', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background-color: var(--bg-container); padding: 40px; border-radius: 15px; width: 90%; max-width: 450px; text-align: center; }
        h1 { color: var(--accent-color); margin-bottom: 10px; }
        .btn { padding: 10px 20px; background-color: var(--accent-color); color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background-color: var(--bg-modal); padding: 30px; border-radius: 12px; width: 300px; }
        .input-group { margin-bottom: 10px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        .point-display { font-size: 1.2rem; font-weight: bold; color: #ffeb3b; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>로샵 (Roshop)</h1>
        <p id="mainMessage">로블록스 개발을 더 쉽게 만들어주는 공간입니다.</p>
        
        <div id="userProfile" style="display: none;">
            <div class="point-display">내 포인트: <span id="currentPoints">0</span>P</div>
            <div id="adminPanel" style="display: none; margin-top: 10px;">
                <button class="btn" style="background-color: #f1c40f;" onclick="addPoints()">관리자: 포인트 +</button>
            </div>
        </div>

        <div id="beforeLogin" class="btn-group">
            <button class="btn" onclick="openModal('loginModal')">로그인</button>
            <button class="btn" onclick="openModal('registerModal')">회원가입</button>
        </div>

        <div id="afterLogin" style="display: none; margin-top: 25px;">
            <button class="btn" onclick="handleLogout()">로그아웃</button>
        </div>
    </div>

    <script>
        let users = []; // { id, email, pw, points: 0 }
        let currentUser = null;

        // 회원가입 로직 수정
        function handleRegisterSubmit(event) {
            event.preventDefault();
            const id = document.getElementById('regId').value;
            const email = document.getElementById('regEmail').value;
            const pw = document.getElementById('regPw').value;

            // 이메일 중복 3회 체크
            const emailCount = users.filter(u => u.email === email).length;
            if (emailCount >= 3) {
                alert("해당 이메일로는 더 이상 가입할 수 없습니다. (최대 3개)");
                return;
            }

            users.push({ id: id, email: email, pw: pw, points: 0 });
            alert(id + '님 가입 완료!');
            document.getElementById('registerModal').classList.remove('active');
        }

        // 로그인 로직 수정
        function handleLoginSubmit(event) {
            event.preventDefault();
            const id = document.getElementById('loginId').value;
            const pw = document.getElementById('loginPw').value;

            // 관리자 확인
            if (id === "pjw0901" && pw === "09012345") {
                currentUser = { id: "관리자", points: 999999 }; // 관리자 더미 데이터
                showLoggedInUI(true);
            } else {
                const user = users.find(u => u.id === id && u.pw === pw);
                if (user) {
                    currentUser = user;
                    showLoggedInUI(false);
                } else {
                    alert("아이디 또는 비밀번호가 틀렸습니다.");
                }
            }
            document.getElementById('loginModal').classList.remove('active');
        }

        function showLoggedInUI(isAdmin) {
            document.getElementById('mainMessage').innerText = `환영합니다, ${currentUser.id}님!`;
            document.getElementById('beforeLogin').style.display = 'none';
            document.getElementById('afterLogin').style.display = 'block';
            document.getElementById('userProfile').style.display = 'block';
            document.getElementById('currentPoints').innerText = currentUser.points;

            if (isAdmin) {
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        // 포인트 추가 기능
        function addPoints() {
            const targetId = prompt("포인트를 추가할 닉네임(아이디)을 입력하세요.");
            const amount = parseInt(prompt("추가할 포인트 금액을 입력하세요."));
            
            const targetUser = users.find(u => u.id === targetId);
            if (targetUser && !isNaN(amount)) {
                targetUser.points += amount;
                alert(`${targetId}님에게 ${amount}포인트가 지급되었습니다.`);
            } else {
                alert("존재하지 않는 사용자거나 잘못된 금액입니다.");
            }
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('mainMessage').innerText = '로블록스 개발을 더 쉽게 만들어주는 공간입니다.';
            document.getElementById('beforeLogin').style.display = 'flex';
            document.getElementById('afterLogin').style.display = 'none';
            document.getElementById('userProfile').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
        }
        
        // ... (나머지 openModal/closeModal 함수들은 그대로 유지)
    </script>
</body>
</html>
